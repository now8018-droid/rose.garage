<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAL Garage</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>
</head>

<body>
    <div class="assist_garage">
        <div class="container_garage">
            <div class="header_garage">
                <div class="header_left">
                    <div class="logo-container">
                        <div class="logo-icon">
                            <iconify-icon class="car-icon" icon="mingcute:car-3-fill"></iconify-icon>
                        </div>
                        <div class="logo-pulse"></div>
                    </div>
                    <div class="header_text">
                        <h1 id="title-garage">ระบบเบิกยานพาหนะ</h1>
                        <span class="garage_subtitle">Garage Control Interface</span>
                    </div>
                </div>
                <div class="header_right">
                    <div class="stat-badge">
                        <iconify-icon icon="solar:garage-bold"></iconify-icon>
                        <span class="stat-count" id="vehicle-count">0</span>
                    </div>
                </div>
            </div>

            <div class="category_type">
                <div class="type_category">
                    <div class="category select_category" data-menu="all">
                        <iconify-icon icon="solar:widget-bold"></iconify-icon>
                        <span>ทั้งหมด</span>
                    </div>
                    <div class="category" data-menu='garage'>
                        <iconify-icon icon="solar:garage-bold"></iconify-icon>
                        <span>การาจ</span>
                    </div>
                    <div class="category" data-menu='pound'>
                        <iconify-icon icon="solar:lock-keyhole-bold"></iconify-icon>
                        <span>พาวน์</span>
                    </div>
                </div>
                <div class="box_search">
                    <iconify-icon icon="solar:magnifer-linear"></iconify-icon>
                    <input type="text" placeholder="Search car..." id="search">
                </div>
            </div>

            <div class="garage_stage">
                <div class="garage_left">
                    <div class="section-label">
                        <span>YOUR VEHICLES</span>
                    </div>
                    <div class="assist_content"></div>
                </div>

                <aside class="garage_detail" id="selected-panel">
                    <div class="detail-header">
                        <span class="detail-mini">● Selected Car</span>
                        <h2 id="selected-name">No Vehicle Selected</h2>
                    </div>

                    <div class="detail-image-wrap">
                        <img id="selected-image" src="./img/sultan2.png" alt="selected vehicle">
                    </div>

                    <div class="detail-meta">
                        <div class="detail-meta-item">
                            <span>Plate</span>
                            <strong id="selected-plate">-</strong>
                        </div>
                        <div class="detail-meta-item">
                            <span>Class</span>
                            <strong id="selected-class">-</strong>
                        </div>
                    </div>

                    <div class="detail-stats">
                        <div class="detail-stat-row">
                            <span>Fuelstatus</span>
                            <div class="detail-track"><i id="selected-fuel-bar"></i></div>
                            <em id="selected-fuel">0%</em>
                        </div>
                        <div class="detail-stat-row">
                            <span>Enginestatus</span>
                            <div class="detail-track"><i id="selected-engine-bar"></i></div>
                            <em id="selected-engine">0%</em>
                        </div>
                    </div>

                    <div class="detail-actions">
                        <button class="detail-btn" id="panel-open-trunk">Open Trunk</button>
                        <button class="detail-btn detail-btn-primary" id="panel-spawn">Drive Car</button>
                    </div>
                </aside>
            </div>

            <div class="assist_devider">
                <iconify-icon icon="solar:info-circle-linear"></iconify-icon>
                <p>เลือกเบิกยานพาหนะ หรือ เปิดจุดเก็บของท้ายรถ</p>
            </div>
        </div>
    </div>

    <div class="display-input">
        <div class="rename-card">
            <div class="rename-title">ระบบเปลี่ยนชื่อยานพาหนะ</div>
            <input id="name-input" type="text" maxlength="30" placeholder="ชื่อที่คุณต้องการเปลี่ยน">
            <button class="submit-btn">บันทึก</button>
        </div>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <script src="iconify-icon.min.js"></script>
    <script src="main.js"></script>
</body>

</html>
