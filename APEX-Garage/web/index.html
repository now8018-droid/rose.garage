<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FiveM Garage UI Clone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-noise"></div>
    <main class="garage-shell">
      <section class="panel panel-left">
        <header class="panel-header">
          <div class="logo-wrap">
            <span class="pill">● GARAGE</span>
            <h1><span>TRACER</span>REPLAY</h1>
          </div>
          <p class="garage-desc">Some short information about the Garage<br />discord.gg/replaystudios</p>
          <button class="close-btn">CLOSE ✕</button>
        </header>

        <div class="toolbar">
          <div class="toolbar-icons">
            <button class="icon-btn">⌂</button>
            <button class="icon-btn active">👤</button>
          </div>
          <div class="search-wrap">
            <input type="text" value="Search car..." aria-label="search" readonly />
            <span>⌕</span>
          </div>
          <div class="toggle-group">
            <button class="toggle active">🅿 Ausgeparkt</button>
            <button class="toggle">🅿 Geparkt</button>
          </div>
          <button class="icon-btn star-head">☆</button>
        </div>

        <section class="car-grid" id="carGrid"></section>
      </section>

      <section class="panel panel-right">
        <div class="pill">● Selected Car ●</div>
        <h2>Audi RS6 Abt /</h2>

        <div class="hero-car">
          <button class="star-corner">☆</button>
          <img src="https://i.imgur.com/Fg7dQLe.png" alt="Audi RS6" />
        </div>

        <div class="plate">J1281G1</div>
        <div class="owner-row">
          <span class="owner">Felix Haffner</span>
          <span class="delete">✕</span>
        </div>

        <button class="share-btn">↗ Share Car</button>

        <div class="stat">
          <div>
            <strong>Fuelstatus</strong>
            <small>Some short information</small>
          </div>
          <div class="bar"><span style="width: 88%"></span></div>
          <em>150L</em>
        </div>

        <div class="stat">
          <div>
            <strong>Trunkspace</strong>
            <small>Some short information</small>
          </div>
          <div class="bar blue"><span style="width: 62%"></span></div>
          <em>150 /500</em>
        </div>

        <div class="stat">
          <div>
            <strong>Enginestatus</strong>
            <small>Some short information</small>
          </div>
          <div class="bar cyan"><span style="width: 64%"></span></div>
          <em>64 %</em>
        </div>

        <div class="actions">
          <button>✕ Repair Car</button>
          <button>⛽ Fuel Car</button>
          <button>➤ Drive Car</button>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
